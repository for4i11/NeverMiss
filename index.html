<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverMiss - Web Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0c0f17;
            --bg-panel: #131824;
            --bg-input: #1a2032;
            --accent-color: #4ade80; /* Зеленый цвет NeverMiss */
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Экраны приложения */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
        }

        .screen.active {
            display: flex;
        }

        /* --- ФОРМА АВТОРИЗАЦИИ / РЕГИСТРАЦИИ --- */
        .auth-container {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            margin: auto;
        }

        .auth-container h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .auth-container p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        .auth-btn {
            width: 100%;
            background: var(--accent-color);
            color: #000;
            font-weight: 600;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .auth-toggle {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-toggle span {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 500;
        }

        /* --- ЛИЧНЫЙ КАБИНЕТ --- */
        .panel-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }
