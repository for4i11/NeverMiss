<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NeverMiss Dashboard</title>
    <style>
        :root {
            --bg-main: #0c0f17;
            --bg-panel: #131824;
            --accent-color: #4ade80;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* Панель */
        .layout { display: flex; width: 100%; height: 100%; }
        
        .sidebar { 
            width: 250px; 
            background: var(--bg-panel); 
            border-right: 1px solid var(--border-color); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
        }

        .menu-btn { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            background: none; 
            border: none; 
            color: var(--text-muted); 
            text-align: left; 
            cursor: pointer; 
            border-radius: 6px;
            font-size: 15px;
        }

        .menu-btn.active { background: #1a2032; color: var(--accent-color); font-weight: bold; }
        
        .main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { 
            background: var(--bg-panel); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
        }
        
        h1 { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="layout">
        <div class="sidebar">
            <h2 style="margin-bottom: 30px; color: var(--accent-color);">NeverMiss</h2>
            <button class="menu-btn active" onclick="switchTab('home', this)">🏠 Главная</button>
            <button class="menu-btn" onclick="switchTab('scripts', this)">⚙️ Скрипты</button>
            <button class="menu-btn" onclick="switchTab('configs', this)">💾 Конфиги</button>
            <button class="menu-btn" onclick="switchTab('styles', this)">🎨 Стили</button>
            <button class="menu-btn" onclick="switchTab('profile', this)">👤 Профиль</button>
        </div>

        <div class="main">
            <div id="tab-home" class="tab-content active">
                <h1>Главная</h1>
                <div class="card">Добро пожаловать в панель управления.</div>
            </div>
            
            <div id="tab-scripts" class="tab-content">
                <h1>Скрипты</h1>
                <div class="card">Здесь будет список твоих скриптов.</div>
            </div>
            
            <div id="tab-configs" class="tab-content">
                <h1>Конфиги</h1>
                <div class="card">Управление конфигурациями.</div>
            </div>
            
            <div id="tab-styles" class="tab-content">
                <h1>Стили</h1>
                <div class="card">Настройка оформления темы.</div>
            </div>
            
            <div id="tab-profile" class="tab-content">
                <h1>Профиль</h1>
                <div class="card">Информация о пользователе.</div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(id, btn) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            // Убираем активный класс у кнопок
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            
            // Показываем нужную
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
